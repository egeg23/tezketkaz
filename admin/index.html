<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>TezKetKaz Admin</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #F8F9FA;
      color: #1A1D1E;
      min-height: 100vh;
    }
    .topbar {
      background: #1A1D1E;
      color: white;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    .topbar h1 { font-size: 16px; font-weight: 700; }
    .topbar .badge {
      background: #2ECC71;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
    }
    .container { display: flex; min-height: calc(100vh - 50px); }
    .sidebar {
      width: 220px;
      background: white;
      border-right: 1px solid #E8ECEF;
      padding: 16px 0;
    }
    .sidebar a {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      color: #6B7280;
      text-decoration: none;
      font-weight: 500;
      font-size: 14px;
      cursor: pointer;
    }
    .sidebar a.active { background: #EAFBF1; color: #2ECC71; border-left: 3px solid #2ECC71; }
    .sidebar a:hover { background: #F8F9FA; }
    .main { flex: 1; padding: 24px; overflow-y: auto; }
    .card {
      background: white;
      border-radius: 16px;
      border: 1px solid #E8ECEF;
      margin-bottom: 16px;
    }
    .card-header {
      padding: 16px 20px;
      border-bottom: 1px solid #E8ECEF;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .card-header h2 { font-size: 16px; font-weight: 700; }
    .card-body { padding: 0; }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 12px 20px; text-align: left; border-bottom: 1px solid #F0F2F4; font-size: 13px; }
    th { color: #6B7280; font-weight: 600; font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; }
    .pill {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
    }
    .pill.pending { background: #FFF3CD; color: #F59E0B; }
    .pill.approved { background: #EAFBF1; color: #2ECC71; }
    .pill.rejected { background: #FFEEEE; color: #EF4444; }
    .btn {
      padding: 6px 14px;
      border-radius: 8px;
      font-weight: 600;
      font-size: 12px;
      cursor: pointer;
      border: none;
      margin-right: 6px;
    }
    .btn-success { background: #2ECC71; color: white; }
    .btn-danger { background: #EF4444; color: white; }
    .btn-secondary { background: #F8F9FA; color: #6B7280; border: 1px solid #E8ECEF; }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat {
      background: white;
      border: 1px solid #E8ECEF;
      border-radius: 16px;
      padding: 20px;
    }
    .stat-label { font-size: 12px; color: #6B7280; text-transform: uppercase; letter-spacing: 0.5px; }
    .stat-value { font-size: 28px; font-weight: 800; margin-top: 6px; }
    .login-screen {
      max-width: 360px;
      margin: 80px auto;
      padding: 32px;
      background: white;
      border-radius: 20px;
      border: 1px solid #E8ECEF;
    }
    input {
      width: 100%;
      padding: 12px 14px;
      border: 1px solid #E8ECEF;
      border-radius: 10px;
      font-size: 14px;
      margin-bottom: 12px;
    }
    .empty { text-align: center; padding: 60px 20px; color: #6B7280; }
    .empty span { font-size: 48px; display: block; margin-bottom: 12px; }
  </style>
</head>
<body>

<div id="login" style="display:none">
  <div class="login-screen">
    <h2 style="margin-bottom: 6px">TezKetKaz Admin</h2>
    <p style="color: #6B7280; margin-bottom: 24px; font-size: 14px">Telefon raqamingizni kiriting</p>
    <input id="phone" type="tel" placeholder="+998 XX XXX XX XX" />
    <input id="otp" type="text" placeholder="SMS kod (123456 dev)" style="display:none" />
    <button id="loginBtn" class="btn btn-success" style="width: 100%; padding: 12px; font-size: 14px">SMS yuborish</button>
  </div>
</div>

<div id="app" style="display:none">
  <div class="topbar">
    <h1>⚡ TezKetKaz Admin</h1>
    <span class="badge">v1.0</span>
    <div style="margin-left: auto; display: flex; gap: 12px; align-items: center;">
      <span id="userPhone" style="font-size: 13px; color: #ADB5BD"></span>
      <button class="btn btn-secondary" onclick="logout()">Chiqish</button>
    </div>
  </div>

  <div class="container">
    <nav class="sidebar">
      <a class="nav-link active" data-tab="dashboard">📊 Statistika</a>
      <a class="nav-link" data-tab="couriers">🛵 Kuryerlar</a>
      <a class="nav-link" data-tab="orders">📦 Buyurtmalar</a>
      <a class="nav-link" data-tab="shops">🏪 Do'konlar</a>
      <a class="nav-link" data-tab="users">👥 Foydalanuvchilar</a>
    </nav>

    <main class="main" id="content"></main>
  </div>
</div>

<script>
const API = window.location.origin.replace(/:\d+$/, ':3000');
let token = localStorage.getItem('admin_token');
let currentTab = 'dashboard';

// ─── Auth ────────────────────────────────────────────────────────────────────
async function login() {
  const phone = document.getElementById('phone').value;
  const otpField = document.getElementById('otp');
  const btn = document.getElementById('loginBtn');

  if (otpField.style.display === 'none') {
    const res = await fetch(`${API}/api/auth/send-otp`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({phone}),
    });
    if (res.ok) {
      otpField.style.display = 'block';
      btn.textContent = 'Tasdiqlash';
    } else {
      alert('Xatolik');
    }
  } else {
    const res = await fetch(`${API}/api/auth/verify-otp`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({phone, code: otpField.value}),
    });
    if (res.ok) {
      const data = await res.json();
      token = data.token;
      localStorage.setItem('admin_token', token);
      showApp(data.user);
    } else {
      alert('Noto\'g\'ri kod');
    }
  }
}

function logout() {
  localStorage.removeItem('admin_token');
  location.reload();
}

async function api(path, opts = {}) {
  const res = await fetch(`${API}${path}`, {
    ...opts,
    headers: {
      'Content-Type': 'application/json',
      'Authorization': `Bearer ${token}`,
      ...(opts.headers || {}),
    },
  });
  if (res.status === 401) { logout(); return null; }
  return res.json();
}

// ─── Tabs ────────────────────────────────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.nav-link').forEach(a => {
    a.classList.toggle('active', a.dataset.tab === tab);
  });
  render();
}

async function render() {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="empty"><span>⏳</span>Yuklanmoqda...</div>';

  switch (currentTab) {
    case 'dashboard': renderDashboard(); break;
    case 'couriers':  renderCouriers(); break;
    case 'orders':    renderOrders(); break;
    case 'shops':     renderShops(); break;
    case 'users':     renderUsers(); break;
  }
}

async function renderDashboard() {
  const data = await api('/api/admin/stats') || {
    users: 0, orders: 0, revenue: 0, couriers: 0, pending: 0
  };
  document.getElementById('content').innerHTML = `
    <h2 style="margin-bottom: 20px">Statistika</h2>
    <div class="stats">
      <div class="stat"><div class="stat-label">Buyurtmalar (jami)</div><div class="stat-value">${data.orders || 0}</div></div>
      <div class="stat"><div class="stat-label">Foydalanuvchilar</div><div class="stat-value">${data.users || 0}</div></div>
      <div class="stat"><div class="stat-label">Faol kuryerlar</div><div class="stat-value">${data.couriers || 0}</div></div>
      <div class="stat"><div class="stat-label">Bugungi tushum</div><div class="stat-value">${(data.revenue || 0).toLocaleString('uz-UZ')} <span style="font-size:14px;color:#6B7280">so'm</span></div></div>
    </div>
    ${data.pending > 0 ? `
      <div class="card" style="background: #FFF3CD; border-color: #F59E0B">
        <div style="padding: 16px 20px; display: flex; align-items: center; gap: 12px">
          <span style="font-size: 24px">⚠️</span>
          <div style="flex: 1"><b>${data.pending} ta kuryer arizasi</b> tasdiqlash kutilmoqda</div>
          <button class="btn btn-success" onclick="switchTab('couriers')">Ko'rish</button>
        </div>
      </div>
    ` : ''}
  `;
}

async function renderCouriers() {
  const data = await api('/api/admin/couriers') || {couriers: []};
  document.getElementById('content').innerHTML = `
    <div class="card">
      <div class="card-header"><h2>🛵 Kuryerlar</h2></div>
      <div class="card-body">
        ${data.couriers.length === 0 ? '<div class="empty"><span>👥</span>Hech kim yo\'q</div>' : `
          <table>
            <thead>
              <tr><th>Ism</th><th>Telefon</th><th>STIR</th><th>Holat</th><th>Reyting</th><th>Buyurtmalar</th><th></th></tr>
            </thead>
            <tbody>
              ${data.couriers.map(c => `
                <tr>
                  <td>${c.name || '—'}</td>
                  <td>${c.phone}</td>
                  <td>${c.stir || '—'}</td>
                  <td><span class="pill ${c.courierStatus}">${c.courierStatus}</span></td>
                  <td>⭐ ${c.rating?.toFixed(1) || '5.0'}</td>
                  <td>${c.ordersCount || 0}</td>
                  <td>
                    ${c.courierStatus === 'pending' ? `
                      <button class="btn btn-success" onclick="approveCourier('${c.id}')">Tasdiqlash</button>
                      <button class="btn btn-danger" onclick="rejectCourier('${c.id}')">Rad</button>
                    ` : ''}
                  </td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `}
      </div>
    </div>
  `;
}

async function approveCourier(id) {
  await api(`/api/admin/couriers/${id}/approve`, {method: 'POST'});
  render();
}
async function rejectCourier(id) {
  if (!confirm('Rad etishni tasdiqlaysizmi?')) return;
  await api(`/api/admin/couriers/${id}/reject`, {method: 'POST'});
  render();
}

async function renderOrders() {
  const data = await api('/api/admin/orders') || {orders: []};
  document.getElementById('content').innerHTML = `
    <div class="card">
      <div class="card-header"><h2>📦 Buyurtmalar</h2></div>
      <div class="card-body">
        ${data.orders.length === 0 ? '<div class="empty"><span>📋</span>Buyurtma yo\'q</div>' : `
          <table>
            <thead><tr><th>№</th><th>Xaridor</th><th>Do'kon</th><th>Summa</th><th>Holat</th><th>Vaqt</th></tr></thead>
            <tbody>
              ${data.orders.map(o => `
                <tr>
                  <td><b>${o.orderNumber || o.id.slice(-6)}</b></td>
                  <td>${o.customerName}</td>
                  <td>${o.shop?.name || '—'}</td>
                  <td>${o.total.toLocaleString('uz-UZ')} so'm</td>
                  <td><span class="pill">${o.status}</span></td>
                  <td>${new Date(o.createdAt).toLocaleString('uz-UZ')}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        `}
      </div>
    </div>
  `;
}

async function renderShops() {
  const data = await api('/api/shops') || {shops: []};
  document.getElementById('content').innerHTML = `
    <div class="card">
      <div class="card-header"><h2>🏪 Do'konlar</h2></div>
      <div class="card-body">
        <table>
          <thead><tr><th>Nomi</th><th>Manzil</th><th>Reyting</th><th>Holat</th></tr></thead>
          <tbody>
            ${data.shops.map(s => `
              <tr>
                <td><b>${s.name}</b></td>
                <td>${s.address}</td>
                <td>⭐ ${s.rating.toFixed(1)}</td>
                <td><span class="pill approved">${s.isActive ? 'Faol' : 'O\'chirilgan'}</span></td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

async function renderUsers() {
  const data = await api('/api/admin/users') || {users: []};
  document.getElementById('content').innerHTML = `
    <div class="card">
      <div class="card-header"><h2>👥 Foydalanuvchilar (${data.users.length})</h2></div>
      <div class="card-body">
        <table>
          <thead><tr><th>Telefon</th><th>Ism</th><th>Rollar</th><th>Buyurtmalar</th><th>Ro'yxatga olingan</th></tr></thead>
          <tbody>
            ${data.users.map(u => `
              <tr>
                <td>${u.phone}</td>
                <td>${u.name || '—'}</td>
                <td>
                  ${u.isBuyer ? '<span class="pill approved">Xaridor</span>' : ''}
                  ${u.isCourier ? '<span class="pill approved">Kuryer</span>' : ''}
                  ${u.isShop ? '<span class="pill approved">Do\'kon</span>' : ''}
                </td>
                <td>${u.ordersCount || 0}</td>
                <td>${new Date(u.createdAt).toLocaleDateString('uz-UZ')}</td>
              </tr>
            `).join('')}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

// ─── Init ────────────────────────────────────────────────────────────────────
function showApp(user) {
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('userPhone').textContent = user.phone;
  document.querySelectorAll('.nav-link').forEach(link => {
    link.addEventListener('click', () => switchTab(link.dataset.tab));
  });
  render();
}

document.getElementById('loginBtn').addEventListener('click', login);

// On load: try to use saved token
if (token) {
  fetch(`${API}/api/auth/me`, { headers: {'Authorization': `Bearer ${token}`} })
    .then(r => r.ok ? r.json() : null)
    .then(data => {
      if (data?.user) showApp(data.user);
      else { localStorage.removeItem('admin_token'); document.getElementById('login').style.display = 'block'; }
    });
} else {
  document.getElementById('login').style.display = 'block';
}
</script>
</body>
</html>
