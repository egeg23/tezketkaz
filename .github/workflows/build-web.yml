name: Build Flutter web bundle

# Rebuilds build/web on every push so the backend can serve it without
# needing Flutter on the deploy host. Skips itself when the only change
# is the bundle (commit message starts with "ci:").
on:
  push:
    branches: [main]
    paths:
      - 'lib/**'
      - 'web/**'
      - 'pubspec.yaml'
      - 'pubspec.lock'
      - '.github/workflows/build-web.yml'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    if: ${{ !startsWith(github.event.head_commit.message, 'ci:') }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - run: flutter pub get
      # Pass Yandex client-side keys via --dart-define so they live in the
      # JS bundle and not in source. Empty fallback keeps OSS forks compiling.
      # Configure these as repository secrets at
      # https://github.com/<owner>/<repo>/settings/secrets/actions
      - run: |
          flutter build web --release --pwa-strategy=none \
            --dart-define=YANDEX_JS_API_KEY=${{ secrets.YANDEX_JS_API_KEY }} \
            --dart-define=YANDEX_MAPKIT_API_KEY=${{ secrets.YANDEX_MAPKIT_API_KEY }}

      - name: Commit rebuilt web bundle
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f build/web
          if git diff --cached --quiet; then
            echo "No web changes."
            exit 0
          fi
          git commit -m "ci: rebuild Flutter web bundle"
          git push
