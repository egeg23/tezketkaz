# Build and deploy the TezKetKaz marketing site (tezketkaz.uz) to
# Cloudflare Pages.
#
# Required repository secrets:
#   CLOUDFLARE_API_TOKEN   — Cloudflare API token with "Pages: Edit" scope
#                            (My Profile → API Tokens → Create Custom token)
#   CLOUDFLARE_ACCOUNT_ID  — Account ID from the Cloudflare dashboard sidebar
#
# Setup steps and screenshots: docs/runbooks/marketing-deploy.md

name: Deploy marketing site

on:
  push:
    branches: [main]
    paths:
      - "marketing/**"
      - ".github/workflows/deploy-marketing.yml"
  workflow_dispatch:

concurrency:
  group: marketing-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  deployments: write

jobs:
  build-and-deploy:
    name: Build + deploy
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: marketing

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: marketing/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build (static export)
        env:
          NEXT_PUBLIC_API_BASE: https://api.tezketkaz.uz
        run: npm run build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: tezketkaz-marketing
          directory: marketing/out
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          branch: ${{ github.ref == 'refs/heads/main' && 'main' || github.head_ref }}
