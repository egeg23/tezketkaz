<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="g2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00BFA5"/>
      <stop offset="100%" stop-color="#00897B"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="1024" height="1024" rx="224" ry="224" fill="url(#g2)"/>
  <!-- Courier bag (square with rounded corners) -->
  <g fill="white">
    <rect x="288" y="384" width="448" height="448" rx="48" ry="48"/>
  </g>
  <!-- Bag handle (curved strap on top) -->
  <path d="M 384 384 Q 384 256 512 256 Q 640 256 640 384" stroke="white" stroke-width="48" fill="none" stroke-linecap="round"/>
  <!-- Motion lines behind bag (speed indicator) -->
  <g stroke="white" stroke-width="32" stroke-linecap="round" opacity="0.7">
    <line x1="128" y1="544" x2="240" y2="544"/>
    <line x1="160" y1="640" x2="240" y2="640"/>
    <line x1="128" y1="736" x2="240" y2="736"/>
  </g>
  <!-- "T" mark on bag -->
  <g fill="#00897B">
    <rect x="464" y="528" width="96" height="240" rx="16"/>
    <rect x="384" y="528" width="256" height="64" rx="16"/>
  </g>
</svg>
