plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
    // Phase 13.1.6 — Firebase. The plugin parses google-services.json at
    // build time; without that file (placeholder ships with TODOs) gradle
    // will warn but still produce a working debug APK without FCM.
    id "com.google.gms.google-services"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader -> localProperties.load(reader) }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode') ?: '1'
def flutterVersionName = localProperties.getProperty('flutter.versionName') ?: '1.0'

def keystoreProperties = new Properties()
def keystorePropertiesFile = rootProject.file('key.properties')
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

android {
    namespace "uz.tezketkaz.app"
    compileSdk 36
    ndkVersion "25.1.8937393"

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = '17'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId "uz.tezketkaz.app"
        minSdkVersion flutter.minSdkVersion   // Android 6.0+
        targetSdkVersion 36
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
        multiDexEnabled true

        // Yandex MapKit API key — добавьте в gradle.properties
        manifestPlaceholders += [
            YANDEX_MAPKIT_API_KEY: project.findProperty('YANDEX_MAPKIT_API_KEY') ?: 'YOUR_API_KEY_HERE'
        ]
    }

    signingConfigs {
        release {
            // Prefer key.properties for local dev; fall back to env vars for
            // CI (set by .github/workflows/release.yml). Either source must
            // provide all four fields or the release build will fail signing.
            def envStoreFile = System.getenv('ANDROID_KEYSTORE_PATH')
            if (keystoreProperties['storeFile'] != null) {
                keyAlias keystoreProperties['keyAlias']
                keyPassword keystoreProperties['keyPassword']
                storeFile file(keystoreProperties['storeFile'])
                storePassword keystoreProperties['storePassword']
            } else if (envStoreFile != null && !envStoreFile.isEmpty()) {
                keyAlias System.getenv('ANDROID_KEY_ALIAS')
                keyPassword System.getenv('ANDROID_KEY_PASSWORD')
                storeFile file(envStoreFile)
                storePassword System.getenv('ANDROID_KEYSTORE_PASSWORD')
            }
        }
    }

    buildTypes {
        release {
            signingConfig signingConfigs.release
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
        }
        debug {
            signingConfig signingConfigs.debug
        }
    }
}

flutter {
    source '../..'
}

dependencies {
    implementation "org.jetbrains.kotlin:kotlin-stdlib-jdk7:1.9.22"
    implementation "androidx.multidex:multidex:2.0.1"

    // Phase 13.1.6 — Firebase BoM pins messaging + analytics versions to a
    // mutually compatible release. The individual artifacts inherit their
    // version from the BoM so we never need to edit them by hand.
    implementation platform("com.google.firebase:firebase-bom:33.5.0")
    implementation "com.google.firebase:firebase-messaging"
    implementation "com.google.firebase:firebase-analytics"
}
