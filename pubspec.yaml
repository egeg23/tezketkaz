name: tezketkaz
description: TezKetKaz — доставка продуктов по Узбекистану
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # Network
  dio: ^5.4.3+1
  socket_io_client: ^2.0.3+1

  # Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # Push & Firebase
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  firebase_analytics: ^11.0.0
  flutter_local_notifications: ^17.2.3

  # Phase 7.3 — referral share sheet
  share_plus: ^10.0.0

  # Maps (для production)
  yandex_mapkit: ^3.4.0

  # Utils
  intl: ^0.19.0
  pin_code_fields: ^8.0.1
  mask_text_input_formatter: ^2.9.0
  url_launcher: ^6.3.0
  image_picker: ^1.1.2
  file_picker: ^8.1.4
  http_parser: ^4.0.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Phase 6 — geolocation + permissions for the cart map picker / current location flow
  geolocator: ^13.0.0
  permission_handler: ^11.0.0

  # Observability
  sentry_flutter: ^8.9.0

  # Phase 9.3 — social sign-in (Apple + Google)
  sign_in_with_apple: ^6.1.0
  google_sign_in: ^6.2.1

  # Phase 12 — launch prep
  flutter_markdown: ^0.7.4   # legal screen renders Privacy/Terms markdown
  in_app_review: ^2.0.9      # native review sheet after Nth successful order

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mockito: ^5.4.4
  mocktail: ^1.0.4
  build_runner: ^2.4.13
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/launcher/

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "assets/launcher/icon-1024.png"
  min_sdk_android: 21
  remove_alpha_ios: true
  background_color_ios: "#1A237E"
  adaptive_icon_background: "#1A237E"
  adaptive_icon_foreground: "assets/launcher/icon-fg-1024.png"
  web:
    generate: true
    image_path: "assets/launcher/icon-1024.png"
    background_color: "#1A237E"
    theme_color: "#1A237E"

flutter_native_splash:
  color: "#1A237E"
  image: "assets/launcher/splash-logo.png"
  android_12:
    color: "#1A237E"
    image: "assets/launcher/splash-logo.png"
  ios: true
  android: true
  web: false
