name: tezketkaz
description: TezKetKaz — доставка продуктов по Узбекистану
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^13.2.0

  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0

  # Network
  dio: ^5.4.3+1
  socket_io_client: ^2.0.3+1

  # Storage
  shared_preferences: ^2.2.3
  flutter_secure_storage: ^9.0.0

  # Push & Firebase
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.3

  # Maps (для production)
  yandex_mapkit: ^3.4.0

  # Utils
  intl: ^0.19.0
  pin_code_fields: ^8.0.1
  mask_text_input_formatter: ^2.9.0
  url_launcher: ^6.3.0
  image_picker: ^1.1.2
  file_picker: ^8.1.4
  http_parser: ^4.0.2
  flutter_map: ^7.0.2
  latlong2: ^0.9.1

  # Observability
  sentry_flutter: ^8.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  mockito: ^5.4.4
  mocktail: ^1.0.4
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
