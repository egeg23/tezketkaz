# TezKetKaz staging — 4-service stack.
#
# Каждый сервис собран так, чтобы можно было поднять без рук:
#   $ cd infra && docker compose up -d
#
# Порт 80/443 наружу занимает Caddy (auto-Let's Encrypt). Node, Postgres
# и Redis торчат только в Docker network — наружу не светятся.

name: tezketkaz

services:
  # ────────────────────────────────────────────────────────────────────────
  # Caddy — reverse proxy + автоматический HTTPS
  # ────────────────────────────────────────────────────────────────────────
  # На первом запуске запросит Let's Encrypt cert (HTTP-01 challenge),
  # обновляет автоматически. Конфиг в Caddyfile.
  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"          # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data        # cert storage — НЕ удалять, иначе rate-limit от LE
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN}         # подставляется из .env
    networks: [tezketkaz]
    depends_on:
      backend:
        condition: service_healthy

  # ────────────────────────────────────────────────────────────────────────
  # Node backend — Express + Prisma + Socket.IO + BullMQ
  # ────────────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ..
      dockerfile: infra/Dockerfile.backend
    restart: unless-stopped
    env_file: .env
    environment:
      # Перебиваем то, что должно быть пере-вычислено внутри контейнера
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_HOST: redis
      REDIS_PORT: "6379"
    volumes:
      - backend_uploads:/app/backend/uploads
      # build/web для Flutter frontend. Раз в CI собирается и комитится,
      # бэкенд сам отдаёт статику. Если хочется hot-reload фронта — можно
      # ./web override'нуть, но для staging проще через git pull.
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    networks: [tezketkaz]
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started

  # ────────────────────────────────────────────────────────────────────────
  # Postgres 16
  # ────────────────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      # Performance hints — для 12 GB сервера 2 GB shared_buffers нормально
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    command: >
      postgres
      -c shared_buffers=2GB
      -c effective_cache_size=6GB
      -c work_mem=32MB
      -c maintenance_work_mem=256MB
      -c log_min_duration_statement=1000
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s
    networks: [tezketkaz]

  # ────────────────────────────────────────────────────────────────────────
  # Redis 7 — BullMQ queues + socket adapter + OTP rate limiting
  # ────────────────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 1gb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis_data:/data
    networks: [tezketkaz]

volumes:
  caddy_data:
  caddy_config:
  backend_uploads:
  postgres_data:
  redis_data:

networks:
  tezketkaz:
    driver: bridge
