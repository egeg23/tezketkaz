# Render blueprint — one-click deploy for the backend (which also serves
# the prebuilt Flutter web bundle from build/web).
#
# To use: connect this repo on https://dashboard.render.com/blueprints
#
# IMPORTANT: as of Phase 13.1.1 the backend requires Postgres (prisma
# `provider = "postgresql"`). The SQLite path was retired. The blueprint
# below leaves DATABASE_URL unset — wire it to a managed Postgres (Neon Pro,
# Render Postgres, Supabase, …) via the dashboard before the first deploy.
services:
  - type: web
    name: tezketkaz
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: .
    plan: free
    region: frankfurt
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      # Wire DATABASE_URL via the Render dashboard after creating the service.
      # Must be a postgresql:// URL — sqlite is no longer supported.
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_TTL
        value: 1h
      - key: JWT_REFRESH_TTL
        value: 30d
      - key: USE_MOCK_SMS
        value: "true"
      - key: USE_MOCK_PAYMENTS
        value: "true"
      - key: USE_MOCK_TAX
        value: "true"
      - key: USE_MOCK_SOLIQ
        value: "true"
      - key: REDIS_ENABLED
        value: "false"
      - key: COURIER_RADIUS_KM
        value: "5"
